installCRDs: true

# =========================================================
# CONTROLLER CONFIGURATION
# =========================================================
replicaCount: 1

serviceAccount:
  create: true
  name: external-secrets
  annotations:
    # IRSA (IAM Role for Service Accounts)
    eks.amazonaws.com/role-arn: "${EXTERNAL_SECRETS_IAM_ROLE_ARN}"

# =========================================================
# METRICS (OPTIONAL BUT RECOMMENDED)
# =========================================================
metrics:
  enabled: true
  serviceMonitor:
    enabled: false

# =========================================================
# LOG LEVEL
# =========================================================
logLevel: info