community:
  enabled: true

monitoringPasscode: "${SONAR_MONITORING_PASSCODE}"

postgresql:
  image:
    tag: 15.6.0-debian-11-r16

  auth:
    username: sonarqube
    password: "${SONAR_DB_PASSWORD}"
    database: sonarqube

initSysctl:
  enabled: true
  vmMaxMapCount: 524288
  fsFileMax: 131072
  nofile: 131072
  nproc: 8192

# =========================================================
# PRODUCTION HARDENING (RECOMMENDED ADDITION)
# =========================================================

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi