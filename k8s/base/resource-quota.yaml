apiVersion: v1
kind: ResourceQuota

metadata:
  name: app-resource-quota
  namespace: app

spec:
  hard:
    pods: "20"

    requests.cpu: "4"
    requests.memory: 8Gi

    limits.cpu: "8"
    limits.memory: 16Gi

    persistentvolumeclaims: "10"

    services: "20"

    secrets: "30"

    configmaps: "30"

    requests.storage: 100Gi