apiVersion: v1
kind: LimitRange

metadata:
  name: app-limit-range
  namespace: app

spec:
  limits:

    - type: Container

      default:
        cpu: "500m"
        memory: "512Mi"

      defaultRequest:
        cpu: "200m"
        memory: "256Mi"

      max:
        cpu: "2"
        memory: "2Gi"

      min:
        cpu: "100m"
        memory: "128Mi"

      maxLimitRequestRatio:
        cpu: "4"
        memory: "4"

    - type: PersistentVolumeClaim

      min:
        storage: 1Gi

      max:
        storage: 50Gi