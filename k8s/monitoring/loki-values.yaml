auth_enabled: false

commonConfig:
  replication_factor: 1

storage:
  type: filesystem

schemaConfig:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h

server:
  http_listen_port: 3100

ingester:
  wal:
    enabled: true

deploymentMode: SingleBinary

singleBinary:
  replicas: 1

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp3

gateway:
  enabled: true
  ingress:
    enabled: false