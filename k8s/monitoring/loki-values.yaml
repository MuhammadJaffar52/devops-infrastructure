loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    retention_period: 168h   # 7 days retention

  # Helps avoid silent memory issues
  server:
    http_listen_port: 3100

deploymentMode: SingleBinary

singleBinary:
  replicas: 1

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # IMPORTANT: persistence added (fixes data loss problem)
  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp3   # matches AWS EKS best practice

  extraContainers: []
  extraVolumes: []
  extraVolumeMounts: []

chunksCache:
  enabled: false

resultsCache:
  enabled: false

gateway:
  enabled: true

  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ingress:
    enabled: false   # enable later when ALB is ready

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

minio:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

  lokiCanary:
    enabled: false

test:
  enabled: false
