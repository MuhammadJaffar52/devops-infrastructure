apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: app

  labels:
    app: backend
    component: backend
    managed-by: kubectl

spec:

  replicas: 2

  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend
        component: backend

    spec:

      terminationGracePeriodSeconds: 30

      containers:

        - name: backend

          image: BACKEND_IMAGE

          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:

            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_USERNAME

            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_PASSWORD

            - name: MONGO_URI
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb.app.svc.cluster.local:27017/?authSource=admin"

          resources:

            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:

            tcpSocket:
              port: 3000

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:

            tcpSocket:
              port: 3000

            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:

            allowPrivilegeEscalation: false

            readOnlyRootFilesystem: false

            runAsNonRoot: true

            runAsUser: 1001

            capabilities:
              drop:
                - ALL