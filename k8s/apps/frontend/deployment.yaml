apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: app

  labels:
    app: frontend
    component: frontend
    managed-by: kubectl

spec:
  replicas: 2

  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: frontend

  template:

    metadata:
      labels:
        app: frontend
        component: frontend

    spec:

      terminationGracePeriodSeconds: 30

      containers:

        - name: frontend

          image: FRONTEND_IMAGE

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:

            requests:
              cpu: "125m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:

            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:

            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:

            allowPrivilegeEscalation: false

            readOnlyRootFilesystem: false

            # runAsNonRoot: true

            # runAsUser: 101

            capabilities:
              drop:
                - ALL