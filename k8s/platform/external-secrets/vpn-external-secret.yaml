apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vpn-secret
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: vpn-secret

  data:
    - secretKey: cert
      remoteRef:
        key: vpn/client-cert