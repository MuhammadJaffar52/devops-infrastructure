apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mongodb-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: mongodb-secret
    creationPolicy: Owner

  data:
    - secretKey: username
      remoteRef:
        key: mongodb/username

    - secretKey: password
      remoteRef:
        key: mongodb/password